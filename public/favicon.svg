<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fondo -->
  <rect width="100" height="100" fill="#1a1a1a"/>
  
  <!-- Estompeño de carne (con gradiente) -->
  <defs>
    <linearGradient id="meatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d84315;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5b88a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a373;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Parrilla estilizada -->
  <circle cx="50" cy="50" r="35" fill="url(#meatGradient)" opacity="0.9"/>
  
  <!-- Líneas de parrilla -->
  <line x1="30" y1="35" x2="70" y2="35" stroke="url(#goldGradient)" stroke-width="2" opacity="0.7"/>
  <line x1="28" y1="50" x2="72" y2="50" stroke="url(#goldGradient)" stroke-width="2" opacity="0.7"/>
  <line x1="30" y1="65" x2="70" y2="65" stroke="url(#goldGradient)" stroke-width="2" opacity="0.7"/>
  
  <!-- Llama estilizada -->
  <path d="M 50 30 Q 55 20 50 15 Q 45 20 50 30" fill="#ff6e40" opacity="0.8"/>
  
  <!-- Borde dorado -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.5"/>
</svg>
