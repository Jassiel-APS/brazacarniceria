[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[dev]
  command = "npm run dev"
  framework = "static"
  port = 3000

# Reescritura de URL para SPA
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Seguridad headers
[[headers]]
for = "/*"
[headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "SAMEORIGIN"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://wa.me; frame-ancestors 'none'"

# Cache estático
[[headers]]
for = "/static/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML
[[headers]]
for = "/*.html"
[headers.values]
  Cache-Control = "public, max-age=3600, s-maxage=3600"

# Context de producción
[context.production]
  command = "npm run build"

[context.production.environment]
  CONTEXT = "production"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
